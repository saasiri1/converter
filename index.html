<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackboard Grade Converter | محول درجات بلاك بورد</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <div>
    <h1 data-i18n="headerTitle"></h1>
    <p data-i18n="headerSub"></p>
  </div>
  <button class="lang-btn" id="langBtn" data-i18n="langBtn" onclick="toggleLang()"></button>
</header>

<main>

  <!-- STEP 1: Upload Files -->
  <div class="card" id="step1">
    <div class="card-title">
      <span class="step-badge">1</span>
      <span data-i18n="step1Title"></span>
    </div>

    <div class="two-col">
      <div>
        <label class="field-label" data-i18n="bbFileLabel"></label>
        <div class="upload-zone" id="bbZone">
          <input type="file" id="bbFile" accept=".xls,.xlsx,.csv" />
          <div class="upload-label" data-i18n="bbUploadLabel"></div>
          <div class="upload-sub"   data-i18n="bbUploadSub"></div>
          <div class="file-name"    id="bbFileName"></div>
        </div>
        <div class="upload-note" id="bbNote">
          <span class="upload-note-icon">ℹ</span>
          <span data-i18n="bbNote"></span>
        </div>
      </div>
      <div>
        <label class="field-label" data-i18n="ugFileLabel"></label>
        <div class="upload-zone" id="ugZone">
          <input type="file" id="ugFile" accept=".xls,.xlsx" />
          <div class="upload-label" data-i18n="ugUploadLabel"></div>
          <div class="upload-sub"   data-i18n="ugUploadSub"></div>
          <div class="file-name"    id="ugFileName"></div>
        </div>
      </div>
    </div>

    <div style="margin-top:18px; text-align:left">
      <button class="btn-primary" id="btnParse" disabled onclick="parseFiles()" data-i18n="btnParse"></button>
    </div>
  </div>

  <!-- STEP 2: Configure -->
  <div class="card" id="step2">
    <div class="card-title">
      <span class="step-badge">2</span>
      <span data-i18n="step2Title"></span>
    </div>

    <!-- Has Final? -->
    <div class="field-group">
      <label class="field-label" data-i18n="hasFinalLabel"></label>
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="hasFinal" value="yes" onchange="toggleFinalSection()" />
          <span data-i18n="hasFinalYes"></span>
        </label>
        <label class="radio-option">
          <input type="radio" name="hasFinal" value="no" onchange="toggleFinalSection()" checked />
          <span data-i18n="hasFinalNo"></span>
        </label>
      </div>
    </div>

    <!-- Final source (BB vs separate file) -->
    <div id="finalSourceGroup" style="display:none" class="field-group">
      <label class="field-label" data-i18n="finalSourceLabel"></label>
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="finalSource" value="bb" onchange="toggleFinalSource()" checked />
          <span data-i18n="finalSourceBB"></span>
        </label>
        <label class="radio-option">
          <input type="radio" name="finalSource" value="file" onchange="toggleFinalSource()" />
          <span data-i18n="finalSourceFile"></span>
        </label>
      </div>
    </div>

    <!-- Separate final exam file upload -->
    <div id="finalFileSection" style="display:none" class="field-group">
      <label class="field-label" data-i18n="finalFileLabel"></label>
      <div class="upload-zone" id="finalFileZone">
        <input type="file" id="finalExamFile" accept=".xls,.xlsx,.csv" onchange="parseFinalFile()" />
        <div class="upload-label" data-i18n="finalUploadLabel"></div>
        <div class="upload-sub"   data-i18n="finalUploadSub"></div>
        <div class="file-name"    id="finalExamFileName"></div>
      </div>
      <div class="upload-note" style="margin-top:8px">
        <span class="upload-note-icon">ℹ</span>
        <span data-i18n="finalFileNote"></span>
      </div>

      <!-- Column selectors (shown after file is parsed) -->
      <div id="finalFileColSelectors" style="display:none; margin-top:14px">
        <div class="two-col">
          <div>
            <label class="field-label" data-i18n="finalStudentCol"></label>
            <select id="finalFileStudentCol" onchange="updateFormulaInfo()">
              <option value="" data-i18n="selectColPH"></option>
            </select>
          </div>
          <div>
            <label class="field-label" data-i18n="finalGradeCol"></label>
            <select id="finalFileGradeCol" onchange="updateFormulaInfo()">
              <option value="" data-i18n="selectColPH"></option>
            </select>
          </div>
        </div>
        <div class="max-row" style="margin-top:12px">
          <label class="field-label" style="margin:0; white-space:nowrap" data-i18n="finalFileMax"></label>
          <input type="number" id="finalFileMax" min="1" max="10000" oninput="updateFormulaInfo()" />
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Weights -->
    <div class="field-group">
      <label class="field-label" data-i18n="weightsLabel"></label>
      <div class="weight-row">
        <div class="weight-box">
          <div class="field-label" data-i18n="midWeightLabel"></div>
          <div class="weight-input-row">
            <input type="number" id="midtermWeight" min="1" max="200" value="60" oninput="updateFormulaInfo()" />
            <span data-i18n="gradeUnit"></span>
          </div>
        </div>
        <div class="weight-box" id="finalWeightBox" style="display:none">
          <div class="field-label" data-i18n="finWeightLabel"></div>
          <div class="weight-input-row">
            <input type="number" id="finalWeight" min="1" max="200" value="40" oninput="updateFormulaInfo()" />
            <span data-i18n="gradeUnit"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Extra Credit toggle -->
    <div class="field-group">
      <label class="extra-credit-toggle">
        <input type="checkbox" id="hasExtraCredit" onchange="toggleExtraCredit()" />
        <span data-i18n="extraCreditToggle"></span>
      </label>
      <div id="extraCreditSection" style="display:none; margin-top:10px">
        <p class="hint" style="margin-bottom:8px" data-i18n="extraCreditHint"></p>
        <div class="max-row">
          <label class="field-label" style="margin:0; white-space:nowrap" data-i18n="extraCreditCap"></label>
          <input type="number" id="extraCreditCap" min="0" max="100" placeholder="—" oninput="updateFormulaInfo()" />
        </div>
        <p class="hint" data-i18n="extraCreditCapHint"></p>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Column panels -->
    <div class="field-group">
      <label class="field-label" data-i18n="colAssignLabel"></label>
      <p class="hint" style="margin-bottom:12px" data-i18n="colAssignHint"></p>

      <div class="col-panels" id="colPanels">

        <!-- Midterm panel -->
        <div>
          <div class="col-panel">
            <div class="col-panel-header">
              <span data-i18n="midPanelTitle"></span>
              <span class="tag tag-mid" data-i18n="midTag"></span>
            </div>
            <div class="col-checklist" id="midtermCols"></div>
            <div class="col-panel-actions">
              <button class="btn-text" onclick="selectAll('mid')"   data-i18n="selectAll"></button>
              <button class="btn-text" onclick="deselectAll('mid')" data-i18n="deselectAll"></button>
            </div>
          </div>
          <div class="max-row">
            <label class="field-label" style="margin:0; white-space:nowrap" data-i18n="midMaxLabel"></label>
            <input type="number" id="midtermMax" min="1" max="10000" />
          </div>
          <p class="hint" data-i18n="autoCalcHint"></p>
        </div>

        <!-- Final BB panel (shown when source = BB) -->
        <div id="finalPanel" style="display:none">
          <div class="col-panel">
            <div class="col-panel-header">
              <span data-i18n="finPanelTitle"></span>
              <span class="tag tag-fin" data-i18n="finTag"></span>
            </div>
            <div class="col-checklist" id="finalCols"></div>
            <div class="col-panel-actions">
              <button class="btn-text" onclick="selectAll('fin')"   data-i18n="selectAll"></button>
              <button class="btn-text" onclick="deselectAll('fin')" data-i18n="deselectAll"></button>
            </div>
          </div>
          <div class="max-row">
            <label class="field-label" style="margin:0; white-space:nowrap" data-i18n="finMaxLabel"></label>
            <input type="number" id="finalMax" min="1" max="10000" />
          </div>
          <p class="hint" data-i18n="autoCalcHint"></p>
        </div>

        <!-- Extra Credit panel -->
        <div id="extraCreditPanel" style="display:none">
          <div class="col-panel">
            <div class="col-panel-header">
              <span data-i18n="extraCreditPanel"></span>
              <span class="tag tag-extra" data-i18n="extraCreditTag"></span>
            </div>
            <div class="col-checklist" id="extraCreditCols"></div>
            <div class="col-panel-actions">
              <button class="btn-text" onclick="selectAll('ext')"   data-i18n="selectAll"></button>
              <button class="btn-text" onclick="deselectAll('ext')" data-i18n="deselectAll"></button>
            </div>
          </div>
        </div>

      </div>

      <div class="formula-box" id="formulaInfo" style="margin-top:14px"></div>
    </div>

    <div style="margin-top:22px; text-align:left">
      <button class="btn-primary" onclick="processGrades()" data-i18n="btnConvert"></button>
    </div>
  </div>

  <!-- STEP 3: Results & Download -->
  <div class="card" id="step3">
    <div class="card-title">
      <span class="step-badge">3</span>
      <span data-i18n="step3Title"></span>
    </div>

    <div class="note-box" id="noteBox"></div>
    <div class="summary-grid" id="summaryGrid"></div>
    <div id="missingAlert"></div>

    <div class="grade-table-wrap">
      <table class="grade-table" id="gradeTable">
        <thead id="gradeTableHead"></thead>
        <tbody id="gradeTableBody"></tbody>
      </table>
    </div>

    <button class="btn-success" onclick="downloadResult()" data-i18n="btnDownload"></button>
  </div>

</main>

<footer>
  &copy; 2026
  <a href="https://saasiri1.github.io" target="_blank" rel="noopener" style="color:#888; text-decoration:underline;">saasiri1</a>.
  <span data-i18n="footerRights"></span>
</footer>

<script src="js/translations.js"></script>
<script src="js/app.js"></script>
</body>
</html>
